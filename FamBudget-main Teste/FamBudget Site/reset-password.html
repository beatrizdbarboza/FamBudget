<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nova senha</title>

  <link rel="icon" href="imagem/logo_fambudget.png" type="image/png">
  <link rel="stylesheet" href="reset-password.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="container">
    <div class="card">
      <h2>Nova senha</h2>
      <p>Digite sua nova senha</p>

      <form id="resetForm">
        <div class="input-password">
          <input 
            type="password" 
            id="password" 
            class="input" 
            placeholder="Senha" 
            required
          >

          <i 
            class="fa-solid fa-eye togglePassword" 
            data-target="password"
          ></i>
        </div>

        <div id="passwordRequirements" class="password-requirements">
          A senha deve ter no mínimo 8 caracteres, letra maiúscula, letra minúscula, número e caractere especial.
        </div>

        <div class="input-password">
          <input 
            type="password" 
            id="confirmPassword" 
            class="input" 
            placeholder="Confirmar senha" 
            required
          >

          <i 
            class="fa-solid fa-eye togglePassword" 
            data-target="confirmPassword"
          ></i>
        </div>

        <button type="submit">Redefinir senha</button>
      </form>
    </div>
  </div>

  <div id="popup" class="popup-overlay hidden">
    <div class="popup-box">
      <h2 id="popup-text"></h2>
      <button onclick="fecharPopup()">OK</button>
    </div>
  </div>

  <script src="js/reset-password.js"></script>

</body>
</html>
