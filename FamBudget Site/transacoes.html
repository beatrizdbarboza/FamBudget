<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagem/logo_fambudget.png" type="image/png">
    <link rel="stylesheet" href="transacoes.css">
    <title>FamBudget</title>
</head>

<body>

<!-- TOPO -->
<header class="topo">
    <div class="logo">
        <img src="imagem/logo_fambudget.png">
        <span>FamBudget</span>
    </div>

    <div class="user">
      <div class="avatar" id="avatar">U</div>
      <span id="nome-usuario">Usuário</span>
    </div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
    <ul class="menu">
        <li data-link="home.html"><img src="vetorhome/casa.png">Início</li>
        <li data-link="transacoes.html"><img src="vetorhome/carteira.png">Transações</li>
        <li data-link="orcamentos.html"><img src="vetorhome/ocamento.png">Orçamentos</li>
        <li data-link="relatorios.html"><img src="vetorhome/relatorio.png">Relatórios</li>
    </ul>

    <div class="divider"></div>

    <ul class="menu">
        <li data-link="configuracoes.html"><img src="vetorhome/configuracoes.png">Configurações</li>
        <li id="logout-btn"><img src="vetorhome/logout.png">Sair</li>
    </ul>
</aside>

<!-- CONTEÚDO -->
<main class="main-content">
<div class="conteudo">

<!-- TOPO -->
<div class="card-topo">
    <div class="top">
      <h1>Transações</h1>
      <button class="btn-add" onclick="abrirModal()">+ Nova Transação</button>
    </div>
</div>

<!-- SALDO -->
<div class="saldo-card">
    <h2 id="saldo">R$ 0,00</h2>
    <p id="positivo"></p>
</div>

<p id="mensagem-saldo" class="mensagem"></p>

<!-- FILTROS -->
<div class="card-filtros">
    <div class="filtros">
      <input type="text" id="filtro-busca" placeholder="Buscar transações..." onkeyup="filtrarTabela()">

      <select id="filtro-categoria" onchange="filtrarTabela()">
        <option value="">Categoria</option>
        <option>Salário</option>
        <option>Aluguel</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Lazer</option>
        <option>Cartão de Crédito</option>
      </select>

      <select id="filtro-tipo" onchange="filtrarTabela()">
        <option value="">Tipo</option>
        <option>Receita</option>
        <option>Despesa</option>
      </select>

      <button onclick="limparFiltros()" class="btn-limpar">Limpar</button>

    </div>
</div>

<!-- TABELA -->
<div class="card-tabela">
  <table class="tabela">
    <thead>
      <tr>
        <th>Tipo</th>
        <th>Categoria</th>
        <th>Descrição</th>
        <th>Data</th>
        <th>Valor</th>
        <th></th>
      </tr>
    </thead>

    <tbody id="tabela-body">
      <tr id="sem-dados">
        <td colspan="5" style="text-align:center; padding: 20px;">
          Nenhuma transação cadastrada
        </td>  
      </tr>
    </tbody>
      
  </table>
</div>

</div>
</main>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="fechar" onclick="fecharModal()">&times;</span>

    <h2>Nova Transação</h2>

    <div class="formulario">
      <select id="tipo">
        <option>Tipo</option>
        <option>Receita</option>
        <option>Despesa</option>
      </select>

      <select id="categoria" onchange="verificarCartao()">
        <option>Categoria</option>
        <option>Salário</option>
        <option>Aluguel</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Lazer</option>
        <option>Cartão de Crédito</option>
      </select>

      <input type="text" id="descricao" placeholder="Descrição">
      <input type="number" id="valor" placeholder="Valor">
      
      <div id="parcelas-container" style="display:none;">
        <input type="number" id="parcelas" placeholder="Quantidade de parcelas">
      </div>

      <input type="date" id="data">

      <button class="btn-salvar" onclick="salvarTransacao()">Salvar</button>
    </div>

  </div>
</div>

<script src="js/transacoes.js" defer></script>
<script src="main.js" defer></script>

<div id="modal-excluir" class="modal">
  <div class="modal-content">

    <h3>Tem certeza que deseja excluir?</h3>

    <div class="modal-buttons">

      <button onclick="fecharModalExcluir()" class="btn-cancelar">
        Cancelar
      </button>

      <button onclick="confirmarExclusao()" class="btn-excluir">
        Excluir
      </button>

    </div>

  </div>
</div>

</body>
</html>
